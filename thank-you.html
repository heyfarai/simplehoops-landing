<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanks! - Juuk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d0d0d;
        --text: #f5f5f5;
        --text-muted: #a3a3a3;
      }
      html { color-scheme: dark; }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Schibsted Grotesk", Arial, sans-serif;
        line-height: 1.1;
        color: var(--text);
        background: var(--bg);
        font-weight: 400;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }

      .container {
        max-width: 600px;
        animation: fadeIn 0.5s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-size: clamp(2.5rem, 6vw, 5rem);
        font-weight: 900;
        margin-bottom: 2rem;
        letter-spacing: -0.03em;
        color: var(--text);
      }

      p {
        font-size: 1.3rem;
        color: var(--text-muted);
        margin-bottom: 3rem;
        font-weight: 300;
      }

      .back {
        display: inline-block;
        background: var(--text);
        color: var(--bg);
        text-decoration: none;
        padding: 24px 48px;
        font-size: 1.2rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        transition: all 0.2s ease;
      }

      .back:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Got You.</h1>
      <p>We'll be in touch soon with early access.</p>
      <a href="/" class="back">Back to Home</a>
      <div style="margin-top: 3rem; font-size: 0.9rem;">
        <a href="/privacy" style="color: var(--text); margin: 0 0.5rem;">Privacy</a> •
        <a href="/terms" style="color: var(--text); margin: 0 0.5rem;">Terms</a> •
        <a href="/support" style="color: var(--text); margin: 0 0.5rem;">Support</a>
      </div>
    </div>
  </body>
</html>
